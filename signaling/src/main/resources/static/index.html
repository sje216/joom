<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WebRTC Signaling (pcs version)</title>
</head>
<body>
<h2>WebRTC Signaling Test (pcs)</h2>

<label>Room ID</label>
<input id="roomId" value="room1"><br><br>

<label>User ID</label>
<input id="userId" value="user1"><br><br>

<button onclick="join()">Join Room</button>

<pre id="log"></pre>
<div id="remotes"></div>
<video id="localvideo" autoplay playsinline muted width="300"></video>
<video id="remotevideo" autoplay playsinline muted width="300"></video>

<script>
    let ws;
    let localStream;
    let myRole;
    let pcs = {}; // 핵심: peerId -> RTCPeerConnection
    let pendingCandidates = {};

    const config = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
      ]
    };

    function log(msg) {
      document.getElementById("log").textContent += msg + "\n";
    }

    /* =========================
       WebSocket
       ========================= */
    window.onload = () => {
      ws = new WebSocket("ws://localhost:8080/ws");

      ws.onopen = () => log("✅ WebSocket connected");

      ws.onmessage = async (e) => {
        const msg = JSON.parse(e.data);

        switch (msg.type) {

          /* ---------- JOIN ---------- */
          case "JOIN_ACK":
            myRole = msg.role;
            await startCam();
            log("🎭 role = " + myRole);
            break;

          /* ---------- 새 피어 들어옴 (CALLER만 처리) ---------- */
          case "PEER_READY":
            const peerId = msg.userId;
            log("👤 peer joined: " + peerId);

            if (myRole === "CALLER") {
              const pc = createPC(peerId);
              if(!pc) return;

              const offer = await pc.createOffer();
              await pc.setLocalDescription(offer);

              ws.send(JSON.stringify({
                type: "OFFER",
                roomId: roomId.value,
                userId: userId.value,
                target: msg.userId,
                sdp: offer
              }));
            }
            break;

          /* ---------- OFFER ---------- */
          case "OFFER": {
          const peerId = msg.userId;
            log("📩 OFFER from " + peerId);

            const pc = createPC(peerId);
            if(!pc) return;
            await pc.setRemoteDescription(msg.sdp);

            if(pendingCandidates[peerId]) {
                for(const c of pendingCandidates[peerId]) {
                    await pc.addIceCandidate(c);
                }
                delete pendingCandidates[peerId];
            }

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            ws.send(JSON.stringify({
              type: "ANSWER",
              roomId: roomId.value,
              userId: userId.value,
              target: msg.userId,
              sdp: answer
            }));
            break;
          }

          /* ---------- ANSWER ---------- */
          case "ANSWER": {
            const peerId = msg.userId;
            log("📩 ANSWER from " + peerId);
            const pc = pcs[peerId];
            await pc.setRemoteDescription(msg.sdp);

            if(pendingCandidates[peerId]) {
                for(const c of pendingCandidates[peerId]) {
                    await pc.addIceCandidate(c);
                }
                delete pendingCandidates[peerId];
            }
            break;
          }

          /* ---------- ICE ---------- */
          case "ICE": {
            const peerId = msg.userId;

            if(!pendingCandidates[peerId]) {
                pendingCandidates[peerId] = [];
            }
            pendingCandidates[peerId].push(msg.candidate);

            const pc = pcs[peerId];
            if(pc && pc.remoteDescription) {
                for(const c of pendingCandidates[peerId]) {
                    await pc.addIceCandidate(c);
                }
                delete pendingCandidates[peerId];
            }
            break;
          }

          /* ---------- LEAVE ---------- */
          case "LEAVE":
            log("👋 left: " + msg.userId);
            if (pcs[msg.userId]) {
              pcs[msg.userId].close();
              delete pcs[msg.userId];
            }
            break;
        }
      };
    };

    /* =========================
       JOIN
       ========================= */
    function join() {
      ws.send(JSON.stringify({
        type: "JOIN",
        roomId: roomId.value,
        userId: userId.value
      }));
    }

    /* =========================
       Camera / Mic
       ========================= */
    async function startCam() {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });

      localvideo.srcObject = localStream;
    }

    /* =========================
       PeerConnection 생성
       ========================= */
    function createPC(peerId) {
      if(!localStream) {
        console.warn("localStream not ready, delay createPC for", peerId);
        return null;
      }

      if (pcs[peerId]) return pcs[peerId];

      const pc = new RTCPeerConnection(config);

      // local tracks
      localStream.getTracks().forEach(track =>
        pc.addTrack(track, localStream)
      );

      // remote track
      pc.ontrack = e => {
        log("🎥 ontrack from " + peerId);
        let video = document.getElementById('remote-' + peerId);
        if(!video){
            video = document.createElement('video');
            videoid = "remote-" + peerId;
            video.autoplay = true;
            video.width = "300";
            video.playsInline = true;
            document.getElementById("remotes").appendChild(video);
        }
        video.srcObject = e.streams[0];
      };

      // ICE
      pc.onicecandidate = e => {
        if (e.candidate) {
          ws.send(JSON.stringify({
            type: "ICE",
            roomId: roomId.value,
            userId: userId.value,
            target: peerId,
            candidate: e.candidate
          }));
        }
      };

      pcs[peerId] = pc;
      return pc;
    }
</script>
</body>
</html>
